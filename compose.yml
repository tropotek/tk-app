# Development
name: tk-app-dev

services:
  app:
    build:
      context: .
    restart: unless-stopped
    tty: true
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./app:/app
      - ./app/docker/php.ini:/usr/local/etc/php/conf.d/overrides.ini
    networks:
      - network
    environment:
      SERVER_NAME: ":80"
      APP_ENV: local
      APP_DEBUG: true
      MAIL_HOST: mailpit
      MAIL_MAILER: smtp
      MAIL_PORT: 1025

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    tty: true
    volumes:
      - ./docker/mailpit:/data
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025" # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP server
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - network

  queue:
    build:
      context: .
    volumes:
      - ./app:/app
    entrypoint: ["php"]
    command: ["/app/artisan", "queue:work", "--verbose", "--tries=5", "--timeout=90", "--sleep=3"]
    restart: unless-stopped
    networks:
      - network


# Networks
# ggl: Docker comose with macvlan
# ggl: Docker comose with ipvlan
# ggl: Docker comose with ipvlan l3 (for local lan???)
networks:
  network:
    driver: bridge
