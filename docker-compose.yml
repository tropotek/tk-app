# Development
name: tk-app

x-shared: &app_shared
  build:
    context: .
    target: ${DOCKER_TARGET:-local}
  volumes:
    - .:/app
    - ./docker/php.ini:/usr/local/etc/php/conf.d/overrides.ini
    - caddy_data:/data/caddy
    - caddy_config:/config/caddy

services:
  # app with vite enabled
  app:
    <<: *app_shared
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
#      - '${VITE_PORT:-5173}:5173'
    restart: unless-stopped
    tty: true
    environment:
      SERVER_NAME: "${SERVER_NAME:-localhost}"
      VITE_PORT: "${VITE_PORT:-5173}"
      APP_ENV: "${APP_ENV:-production}"
    networks:
      - network

#  app:
#    <<: *app_shared
#    ports:
#      - "${HTTP_PORT:-80}:80"
#      - "${HTTPS_PORT:-443}:443"
#      - "${HTTPS_PORT:-443}:443/udp"
#    restart: unless-stopped
#    tty: true
#    environment:
#      SERVER_NAME: "${SERVER_NAME:-localhost}"
#    networks:
#      - network

  vite:
    <<: *app_shared
    ports:
      - '${VITE_PORT:-5173}:5173'
    restart: unless-stopped
    tty: true
    environment:
      APP_URL: "http://localhost:${HTTP_PORT}"
      VITE_PORT: "${VITE_PORT:-5173}"
    working_dir: /app
    command: npm run dev
    healthcheck:
      # Use wget to check if the Vite server is responding
      test: [ "CMD-SHELL", "curl -s http://127.0.0.1:5173/ | grep -q 'This is the Vite development server'" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - network

  queue:
    <<: *app_shared
    working_dir: /app
    entrypoint: ["php"]
    command: ["artisan", "queue:work", "--verbose", "--tries=5", "--timeout=90", "--sleep=3"]
    healthcheck:
      test: [ "CMD", "sh", "-c", "pgrep -f 'php artisan queue:work' > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - network

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    tty: true
    volumes:
      - ./docker/mailpit:/data
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025" # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP server
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - network

volumes:
  caddy_data:
  caddy_config:

networks:
  network:
