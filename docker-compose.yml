# Development environment
name: ${APP_NAME}

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: ${APP_NAME}
    restart: unless-stopped
    tty: true
    ports:
      - "${HTTP_LOCAL_PORT:-80}:80"
    volumes:
      - ./app:/app
      - ./app/docker/php.ini:/usr/local/etc/php/conf.d/overrides.ini
    environment:
      # diable HTTPS
      SERVER_NAME: :80
      APP_NAME: "${APP_NAME:-tk-app}"
      APP_URL: "https://localhost:${HTTPS_LOCAL_PORT:-80}/"
      MAIL_HOST: mailpit
      MAIL_MAILER: smtp
      MAIL_PORT: ${MAILPIT_SMTP_PORT:-1025}

  mailpit:
    image: axllent/mailpit
    container_name: ${APP_NAME}_mailpit
    restart: unless-stopped
    tty: true
    volumes:
      - ./docker/mailpit:/data
    ports:
      - "${MAILPIT_HTTP_PORT:-8080}:8080" # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP server
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  queue:
    build:
      context: .
      dockerfile: app/Dockerfile
    volumes:
      - ./app:/app
    entrypoint: ["php"]
    command: ["/app/artisan", "queue:work", "--verbose", "--tries=5", "--timeout=90", "--sleep=3"]
    restart: unless-stopped

  composer:
#    profiles: [ "tools" ]
    image: composer:latest
    working_dir: /app
    tty: true
    volumes:
      - ./app:/app
    entrypoint: [ "composer" ]
    command: [ "install", "--no-interaction", "--prefer-dist" ]
    restart: "no"

#  artisan:
#    profiles: [ "tools" ]
#    build:
#      context: .
#      dockerfile: app/Dockerfile
#    tty: true
#    volumes:
#      - ./app:/app
#    working_dir: /app
#    entrypoint: [ "php" ]
#    command: [ "artisan", "app:update" ]
#    depends_on:
#      composer:
#        condition: service_completed_successfully
#    restart: "no"

  migrate:
#    profiles: [ "tools" ]
    build:
      context: .
      dockerfile: app/Dockerfile
    volumes:
      - ./app:/app
    working_dir: /app
    tty: true
    depends_on:
#      artisan:
      composer:
        condition: service_completed_successfully
    entrypoint: ["php"]
    command: [
      "/app/artisan",
      "migrate",
      "--no-ansi",
      "--force"
    ]
    restart: "no"
